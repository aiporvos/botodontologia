<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacientes - Dental Studio Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e4d8c;
            --accent: #3498db;
            --success: #27ae60;
            --sidebar-width: 260px;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: linear-gradient(180deg, rgba(44, 62, 80, 0.95) 0%, rgba(52, 73, 94, 0.95) 100%);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .sidebar-header {
            padding: 25px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .sidebar-header h5 {
            color: white;
            font-size: 1.2rem;
            margin: 0;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }

        .sidebar-nav a:hover, .sidebar-nav a.active {
            background: rgba(255,255,255,0.15);
            color: white;
            border-left-color: var(--accent);
        }

        .sidebar-nav a i {
            width: 25px;
            margin-right: 12px;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 30px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            padding: 25px;
            margin-bottom: 25px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }

        .search-box {
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }

        .search-box input {
            padding-left: 45px;
            border-radius: 12px;
            border: 2px solid #e0e0e0;
        }

        .patient-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: all 0.3s;
            cursor: pointer;
        }

        .patient-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }

        .patient-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent), #2980b9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .btn-glass {
            background: linear-gradient(135deg, var(--accent), #2980b9);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-weight: 600;
        }

        .btn-glass:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
            color: white;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h5><i class="fas fa-tooth me-2"></i>Dental Studio Pro</h5>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard"><i class="fas fa-home"></i> Dashboard</a>
            <a href="/schedule"><i class="fas fa-calendar-alt"></i> Agenda</a>
            <a href="/patients" class="active"><i class="fas fa-users"></i> Pacientes</a>
            <a href="/odontogram"><i class="fas fa-tooth"></i> Odontograma</a>
            <a href="/payments"><i class="fas fa-dollar-sign"></i> Cobros</a>
            <a href="/admin"><i class="fas fa-cog"></i> Administración</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">Pacientes</h1>
            <button class="btn btn-glass" data-bs-toggle="modal" data-bs-target="#newPatientModal">
                <i class="fas fa-plus me-2"></i>Nuevo Paciente
            </button>
        </div>

        <div class="glass-card">
            <div class="search-box mb-4">
                <i class="fas fa-search"></i>
                <input type="text" class="form-control form-control-lg" id="searchInput" 
                       placeholder="Buscar por nombre, DNI o teléfono...">
            </div>

            <div id="patientsList">
                <div class="text-center py-5 text-muted">
                    <i class="fas fa-spinner fa-spin fa-2x"></i>
                    <p class="mt-3">Cargando pacientes...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- New Patient Modal -->
    <div class="modal fade" id="newPatientModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nuevo Paciente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="newPatientForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nombre *</label>
                                <input type="text" class="form-control" id="firstName" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Apellido *</label>
                                <input type="text" class="form-control" id="lastName" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">DNI</label>
                                <input type="text" class="form-control" id="dni">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Teléfono *</label>
                                <input type="tel" class="form-control" id="phone" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="email">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Obra Social</label>
                                <input type="text" class="form-control" id="insurance" placeholder="Particular">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-glass" onclick="savePatient()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadPatients();
            
            document.getElementById('searchInput').addEventListener('input', function() {
                searchPatients(this.value);
            });
        });

        async function loadPatients() {
            try {
                const response = await fetch('/api/patients');
                const data = await response.json();
                displayPatients(data.patients || data);
            } catch (error) {
                console.error('Error loading patients:', error);
                document.getElementById('patientsList').innerHTML = `
                    <div class="text-center py-5 text-danger">
                        <i class="fas fa-exclamation-triangle fa-2x"></i>
                        <p class="mt-3">Error al cargar pacientes</p>
                    </div>
                `;
            }
        }

        function displayPatients(patients) {
            const container = document.getElementById('patientsList');
            
            if (patients.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-5 text-muted">
                        <i class="fas fa-users fa-3x mb-3"></i>
                        <p>No hay pacientes registrados</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = patients.map(patient => `
                <div class="patient-card" onclick="viewPatient(${patient.id})">
                    <div class="d-flex align-items-center">
                        <div class="patient-avatar me-3">
                            ${patient.first_name[0]}${patient.last_name[0]}
                        </div>
                        <div class="flex-grow-1">
                            <h5 class="mb-1">${patient.first_name} ${patient.last_name}</h5>
                            <p class="mb-0 text-muted">
                                <i class="fas fa-phone me-1"></i>${patient.phone || 'Sin teléfono'}
                                ${patient.dni ? `<span class="ms-3"><i class="fas fa-id-card me-1"></i>${patient.dni}</span>` : ''}
                            </p>
                        </div>
                        <div class="text-end">
                            <span class="badge bg-light text-dark">
                                ${patient.obra_social || 'Particular'}
                            </span>
                            <i class="fas fa-chevron-right ms-3 text-muted"></i>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function searchPatients(query) {
            if (query.length < 2) {
                loadPatients();
                return;
            }
            
            try {
                const response = await fetch(`/api/patients/search?q=${encodeURIComponent(query)}`);
                const patients = await response.json();
                displayPatients(patients);
            } catch (error) {
                console.error('Error searching patients:', error);
            }
        }

        async function savePatient() {
            const data = {
                first_name: document.getElementById('firstName').value,
                last_name: document.getElementById('lastName').value,
                dni: document.getElementById('dni').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                obra_social: document.getElementById('insurance').value || 'Particular'
            };
            
            try {
                const response = await fetch('/api/patients', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('newPatientModal')).hide();
                    document.getElementById('newPatientForm').reset();
                    loadPatients();
                } else {
                    alert('Error al guardar el paciente');
                }
            } catch (error) {
                console.error('Error saving patient:', error);
                alert('Error al guardar el paciente');
            }
        }

        function viewPatient(id) {
            window.location.href = `/odontogram?patient=${id}`;
        }
    </script>
</body>
</html>
