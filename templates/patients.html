<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacientes - Dental Studio Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        /* Estilos específicos de pacientes */
        .patient-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            transition: all var(--transition);
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .patient-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            background: white;
        }

        .patient-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            box-shadow: var(--shadow-sm);
        }

        .patient-info h5 {
            color: var(--primary);
            font-weight: 600;
            margin: 0;
        }

        .patient-meta {
            color: var(--gray-600);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .patient-meta i {
            color: var(--accent);
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <i class="fas fa-tooth"></i>
            </div>
            <h5>Dental Studio Pro</h5>
            <small>Sistema de Gestión</small>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard"><i class="fas fa-home"></i> Dashboard</a>
            <a href="/schedule"><i class="fas fa-calendar-alt"></i> Agenda</a>
            <a href="/patients" class="active"><i class="fas fa-users"></i> Pacientes</a>
            <a href="/odontogram"><i class="fas fa-tooth"></i> Odontograma</a>
            <a href="/payments"><i class="fas fa-dollar-sign"></i> Cobros</a>
            <a href="/admin"><i class="fas fa-cog"></i> Administración</a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <div class="page-header">
            <div>
                <h1 class="page-title">
                    <i class="fas fa-users"></i>
                    Pacientes
                </h1>
                <p class="page-subtitle">Gestiona los pacientes de tu clínica</p>
            </div>
            <button class="btn btn-glass btn-glass-primary" data-bs-toggle="modal" data-bs-target="#newPatientModal">
                <i class="fas fa-plus me-2"></i>
                Nuevo Paciente
            </button>
        </div>

        <!-- Stats -->
        <div class="stats-row mb-4">
            <div class="stat-card">
                <div class="stat-icon blue">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-content">
                    <h3 id="totalPatients">-</h3>
                    <p>Total Pacientes</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green">
                    <i class="fas fa-user-plus"></i>
                </div>
                <div class="stat-content">
                    <h3 id="newThisMonth">-</h3>
                    <p>Nuevos este mes</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange">
                    <i class="fas fa-calendar-check"></i>
                </div>
                <div class="stat-content">
                    <h3 id="withAppointments">-</h3>
                    <p>Con turnos hoy</p>
                </div>
            </div>
        </div>

        <!-- Search and List -->
        <div class="glass-card">
            <div class="glass-card-header">
                <h4 class="glass-card-title">
                    <i class="fas fa-list"></i>
                    Lista de Pacientes
                </h4>
            </div>
            
            <div class="search-box mb-4">
                <i class="fas fa-search"></i>
                <input type="text" class="form-control form-control-lg" id="searchInput" 
                       placeholder="Buscar por nombre, DNI, teléfono o email...">
            </div>

            <div id="patientsList">
                <div class="text-center py-5 text-muted">
                    <div class="loading-spinner mb-3"></div>
                    <p>Cargando pacientes...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- New Patient Modal -->
    <div class="modal fade" id="newPatientModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-user-plus me-2"></i>
                        Nuevo Paciente
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="newPatientForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nombre *</label>
                                <input type="text" class="form-control" id="firstName" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Apellido *</label>
                                <input type="text" class="form-control" id="lastName" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">DNI</label>
                                <input type="text" class="form-control" id="dni">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Teléfono *</label>
                                <input type="tel" class="form-control" id="phone" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="email">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Obra Social</label>
                                <input type="text" class="form-control" id="insurance" placeholder="Particular">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Dirección</label>
                            <input type="text" class="form-control" id="address">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Notas</label>
                            <textarea class="form-control" id="notes" rows="2"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-glass btn-glass-primary" onclick="savePatient()">
                        <i class="fas fa-save me-2"></i>
                        Guardar Paciente
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
    <script>
        // Configuración de la API
        const API_CONFIG = {
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'
            }
        };

        document.addEventListener('DOMContentLoaded', function() {
            loadPatients();
            loadStats();

            // Debounce para búsqueda
            let searchTimeout;
            document.getElementById('searchInput').addEventListener('input', function() {
                clearTimeout(searchTimeout);
                const query = this.value;
                searchTimeout = setTimeout(() => {
                    if (query.length >= 2) {
                        searchPatients(query);
                    } else if (query.length === 0) {
                        loadPatients();
                    }
                }, 300);
            });
        });

        async function loadPatients() {
            try {
                const response = await fetch('/api/patients', API_CONFIG);
                
                if (response.status === 401) {
                    window.location.href = '/login';
                    return;
                }
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                displayPatients(data);
            } catch (error) {
                console.error('Error loading patients:', error);
                showError('Error al cargar pacientes. Por favor, intenta de nuevo.');
            }
        }

        async function loadStats() {
            try {
                const [patientsRes, statsRes] = await Promise.all([
                    fetch('/api/patients', API_CONFIG),
                    fetch('/api/stats', API_CONFIG)
                ]);
                
                if (patientsRes.ok) {
                    const patients = await patientsRes.json();
                    document.getElementById('totalPatients').textContent = patients.length || 0;
                }
                
                if (statsRes.ok) {
                    const stats = await statsRes.json();
                    document.getElementById('newThisMonth').textContent = stats.new_patients_month || 0;
                    document.getElementById('withAppointments').textContent = stats.appointments_today || 0;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        function displayPatients(patients) {
            const container = document.getElementById('patientsList');
            
            if (!patients || patients.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-5">
                        <i class="fas fa-users fa-3x text-muted mb-3"></i>
                        <h5 class="text-muted">No hay pacientes registrados</h5>
                        <p class="text-muted">Agrega tu primer paciente usando el botón "Nuevo Paciente"</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = patients.map(patient => `
                <div class="patient-card" onclick="viewPatient(${patient.id})">
                    <div class="d-flex align-items-center">
                        <div class="patient-avatar me-3">
                            ${(patient.first_name?.[0] || 'P')}${(patient.last_name?.[0] || '')}
                        </div>
                        <div class="flex-grow-1 patient-info">
                            <h5>${patient.first_name} ${patient.last_name}</h5>
                            <div class="patient-meta">
                                ${patient.phone ? `<span class="me-3"><i class="fas fa-phone"></i>${patient.phone}</span>` : ''}
                                ${patient.dni ? `<span class="me-3"><i class="fas fa-id-card"></i>${patient.dni}</span>` : ''}
                                ${patient.email ? `<span><i class="fas fa-envelope"></i>${patient.email}</span>` : ''}
                            </div>
                        </div>
                        <div class="text-end">
                            <span class="badge bg-light text-dark border">
                                ${patient.obra_social || 'Particular'}
                            </span>
                            <i class="fas fa-chevron-right ms-3 text-muted"></i>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function searchPatients(query) {
            try {
                const response = await fetch(`/api/patients/search?q=${encodeURIComponent(query)}`, API_CONFIG);
                
                if (response.status === 401) {
                    window.location.href = '/login';
                    return;
                }
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const patients = await response.json();
                displayPatients(patients);
            } catch (error) {
                console.error('Error searching patients:', error);
                showError('Error al buscar pacientes');
            }
        }

        async function savePatient() {
            const form = document.getElementById('newPatientForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const data = {
                first_name: document.getElementById('firstName').value,
                last_name: document.getElementById('lastName').value,
                dni: document.getElementById('dni').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                obra_social: document.getElementById('insurance').value || 'Particular',
                address: document.getElementById('address').value,
                notes: document.getElementById('notes').value
            };

            try {
                const response = await fetch('/api/patients', {
                    ...API_CONFIG,
                    method: 'POST',
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('newPatientModal')).hide();
                    form.reset();
                    showSuccess('Paciente guardado exitosamente');
                    loadPatients();
                    loadStats();
                } else {
                    const error = await response.json();
                    showError(error.detail || 'Error al guardar el paciente');
                }
            } catch (error) {
                console.error('Error saving patient:', error);
                showError('Error al guardar el paciente');
            }
        }

        function viewPatient(id) {
            window.location.href = `/odontogram?patient=${id}`;
        }

        function showError(message) {
            const alert = document.createElement('div');
            alert.className = 'alert alert-danger alert-dismissible fade show position-fixed';
            alert.style.cssText = 'top: 20px; right: 20px; z-index: 9999; max-width: 400px;';
            alert.innerHTML = `
                <i class="fas fa-exclamation-circle me-2"></i>${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.body.appendChild(alert);
            setTimeout(() => alert.remove(), 5000);
        }

        function showSuccess(message) {
            const alert = document.createElement('div');
            alert.className = 'alert alert-success alert-dismissible fade show position-fixed';
            alert.style.cssText = 'top: 20px; right: 20px; z-index: 9999; max-width: 400px;';
            alert.innerHTML = `
                <i class="fas fa-check-circle me-2"></i>${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.body.appendChild(alert);
            setTimeout(() => alert.remove(), 3000);
        }
    </script>
</body>
</html>
